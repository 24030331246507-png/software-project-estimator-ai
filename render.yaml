services:
  - type: web
    name: cost-time-project-analysis-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///dev.db
      - key: FRONTEND_URLS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
